apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networktools
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git://172.20.0.1/helm-charts.git
    targetRevision: main
    path: networktools
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
