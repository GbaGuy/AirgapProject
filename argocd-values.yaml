# ArgoCD custom values for AirgapProject
# Installed from: https://argoproj.github.io/argo-helm

global:
  domain: argocd.local

server:
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    extraPaths: []
    tls: []

  # Override the default HTTPS port to 8080
  extraArgs:
    - --insecure

configs:
  params:
    server.insecure: true

# Reduce resource footprint for dev/airgap environments
controller:
  replicas: 1

redis:
  enabled: true

dex:
  enabled: false

notifications:
  enabled: false
