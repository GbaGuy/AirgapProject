# Harbor custom values for AirgapProject
# Installed from: https://helm.goharbor.io

externalURL: http://harbor.local:8080

expose:
  type: ingress
  tls:
    enabled: false
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    hosts:
      core: harbor.local
    controller: default

# Default admin password — change in production
harborAdminPassword: "Harbor12345"

# Use filesystem storage (suitable for airgap)
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 50Gi
    database:
      size: 5Gi
    redis:
      size: 1Gi
    trivy:
      size: 5Gi

# Internal database
database:
  type: internal

# Internal Redis
redis:
  type: internal

# Vulnerability scanner
trivy:
  enabled: true
