# Default values for networktools
replicaCount: 1

image:
  repository: nicolaka/netshoot
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   add:
  #     - NET_ADMIN
  #     - NET_RAW
  # readOnlyRootFilesystem: false
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  enabled: false
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: networktools.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Keep the pod running with a sleep command
command:
  - sleep
  - "infinity"

# Extra environment variables
env: []
  # - name: MY_VAR
  #   value: "my-value"

# ConfigMap with custom scripts
scripts:
  enabled: false
  data: {}
    # check-dns.sh: |
    #   #!/bin/sh
    #   nslookup kubernetes.default.svc.cluster.local
    # check-connectivity.sh: |
    #   #!/bin/sh
    #   curl -s -o /dev/null -w "%{http_code}" https://example.com

# Run as a CronJob instead of a Deployment
cronjob:
  enabled: false
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
